services:
    cert-gen:
      build: ./docker/certGen
      volumes:
        - certAuth:/app/certs
      restart: "no"

    database:
      image: postgres:17-bookworm
      container_name: database
      restart: on-failure
      env_file:
        - .env
      environment:
        - POSTGRES_USER=postgres
        - POSTGRES_PASSWORD=password
      volumes:
        - postgres_data:/var/lib/postgresql/data
      networks:
        - app_net
      expose:
        - "5432"
  
    database_group:
      image: postgres:17-bookworm
      container_name: database_group
      restart: on-failure
      env_file:
        - .env
      environment:
        - POSTGRES_USER=postgres
        - POSTGRES_PASSWORD=password
        - POSTGRES_DB=likeo
      volumes:
        - postgres_data_group:/var/lib/postgresql/data
      networks:
        - app_net
      expose:
        - "5432"
      # ports:
      #   - "5433:5432"

    minio:
      image: minio/minio:latest
      container_name: minio
      restart: on-failure
      env_file:
        - .env
      environment:
        - MINIO_ROOT_USER=$MINIO_USER
        - MINIO_ROOT_PASSWORD=$MINIO_PASS
      volumes:
        - minio_data:/data
        - certAuth:/root/.minio/certs
      networks:
        - app_net
      ports:
        - "9001:9001"
      expose:
        - "9000"
      command: server /data --console-address ":9001"

    backend:
      build: ./docker/backend_gateway/
      container_name: backend_gateway
      restart: on-failure
      ports:
        - "3000:3000"
      networks:
        - app_net
      volumes:
        - certAuth:/etc/ssl/app:ro

    frontend:
      build: ./docker/utils_frontend/
      container_name: frontend
      restart: on-failure
      ports:
        - "8443:443"
      depends_on:
        - backend
      networks:
        - app_net
      volumes:
        - certAuth:/etc/ssl/app:ro

    user:
      build: ./docker/backend_user/
      container_name: backend_user
      restart: on-failure
      expose:
        - "3001"
      networks:
        - app_net
      volumes:
        - certAuth:/etc/ssl/app:ro

    post:
      build: ./docker/backend_post/
      container_name: backend_post
      restart: on-failure
      expose:
        - "3002"
      networks:
        - app_net
      volumes:
        - certAuth:/etc/ssl/app:ro

    # chat:
    #   build: ./docker/backend_chat/
    #   container_name: backend_chat
    #   restart: on-failure
    #   expose:
    #     - "3003"
    #   networks:
    #     - app_net
    #   volumes:
    #     - certAuth:/etc/ssl/app/:ro

    # upload_file:
    #   build: ./docker/backend_upload_file/
    #   container_name: backend_upload_file
    #   restart: on-failure
    #   expose:
    #     - "3004"
    #   networks:
    #     - app_net
    #   volumes:
    #     - certAuth:/etc/ssl:ro

    group:
      build: ./docker/backend_group/
      container_name: backend_group
      restart: on-failure
      expose:
        - "3005"
      networks:
        - app_net
      volumes:
        - certAuth:/etc/ssl/app:ro

    upload_file:
      build: ./docker/backend_upload_file/
      container_name: backend_upload_file
      restart: on-failure
      expose:
        - "3004"
      networks:
        - app_net
      volumes:
        - certAuth:/etc/ssl/app:ro

volumes:
  postgres_data:
  postgres_data_group:
  certAuth:
  minio_data:

networks:
  app_net:
    driver: bridge
